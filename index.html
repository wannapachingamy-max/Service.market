 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIEL . MON | Fairy Tale Magical Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Mali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --magic-green: #05120e;
            --magic-gold: #f1c40f;
            --glass: rgba(18, 44, 35, 0.6);
        }

        body {
            font-family: 'Mali', cursive;
            background: linear-gradient(135deg, var(--magic-green), #0d211a);
            color: #f3f0df;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์ใบไม้ร่วง */
        #leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .leaf { position: absolute; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        .container { max-width: 500px; margin: auto; position: relative; z-index: 10; text-align: center; }

        /* โลโก้ */
        .logo-wrapper { width: 120px; height: 120px; margin: 0 auto 20px; border: 3px double var(--magic-gold); border-radius: 50%; padding: 5px; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .logo { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Cinzel', serif; color: var(--magic-gold); letter-spacing: 3px; }
        .slogan { background: var(--glass); padding: 15px; border-radius: 15px; font-size: 0.9rem; border: 1px solid rgba(253, 235, 156, 0.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background: var(--glass); padding: 20px; border-radius: 20px; text-decoration: none; color: white; border: 1px solid rgba(253, 235, 156, 0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--magic-gold); }
        .card i { font-size: 2rem; color: var(--magic-gold); margin-bottom: 10px; }

        .contact-btn { display: block; padding: 15px; margin: 10px 0; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; }
        .fb { background: #1877f2; }
        .line { background: #06c755; }
    </style>
</head>
<body>
    <div id="leaf-container"></div>
    <div class="container">
        <div class="header">
            <div class="logo-wrapper">
                <div class="logo">
                    <img src="https://img5.pic.in.th/file/secure-sv1/473e07d23e23ed4ab88935fd1cb45fb6.jpg" alt="Logo">
                </div>
            </div>
            <h1>CHIEL . MON</h1>
            <div class="slogan">↷✦; w e l c o m e ❞<br>ร้านชิเอลมอนยินดีให้บริการค่ะ 𝐍𝐨ว 𝐥𝐨𝐚𝐝𝐢𝐧𝐠. . . ✨</div>
        </div>

        <h2>สินค้า</h2>
        <div class="grid">
            <a href="#" class="card"><i class="fa-solid fa-ghost"></i><p>Identity V</p></a>
            <a href="#" class="card"><i class="fa-solid fa-wand-sparkles"></i><p>Genshin</p></a>
        </div>

        <h2>บริการ</h2>
        <div class="grid">
            <a href="#" class="card"><i class="fa-solid fa-clover"></i><p>ฟาร์มเกม</p></a>
            <a href="#" class="card"><i class="fa-solid fa-crown"></i><p>ดันแรงค์</p></a>
        </div>

        <h2>Contact</h2>
        <a href="https://www.facebook.com/share/1CTGfbxK8g/" class="contact-btn fb"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a href="https://lin.ee/7pt6TZl" class="contact-btn line"><i class="fa-brands fa-line"></i> Line Official</a>
    </div>

    <script>
        const container = document.getElementById('leaf-container');
        const symbols = ['🍃', '🍂', '✨'];
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.fontSize = Math.random() * 20 + 10 + 'px';
            leaf.style.animationDuration = Math.random() * 5 + 5 + 's';
            container.appendChild(leaf);
            setTimeout(() => leaf.remove(), 8000);
        }, 500);
    </script>
</body>
</html>
